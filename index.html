<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>希望学AA APP安装方法</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1270px;
    font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
    background: #fff;
  }
  .outer-wrap {
    width: 1270px;
    min-height: 950px;
    background: linear-gradient(155deg, #ffba35 0%, #ff8c00 52%, #ff6500 100%);
    position: relative;
    padding: 0 0 50px 0;
    overflow: hidden;
  }
  .rays {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0;
    overflow: hidden;
  }
  .top-bar {
    position: relative;
    z-index: 2;
    width: 100%;
    background: white;
    height: 60px;
    display: flex;
    align-items: center;
    padding: 0 26px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .top-bar img.logo {
    height: 44px;
    object-fit: contain;
  }
  .title-area {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 28px 210px 10px 50px;
  }
  .title-area h1 {
    font-size: 68px;
    font-weight: 900;
    color: #fff;
    text-shadow:
      3px 3px 0 #a03000,
      -2px -2px 0 #a03000,
      2px -2px 0 #a03000,
      -2px 2px 0 #a03000,
      4px 6px 12px rgba(0,0,0,0.28);
    letter-spacing: 3px;
    white-space: nowrap;
  }
  .mascot {
    position: absolute;
    top: 8px;
    right: 16px;
    z-index: 10;
    width: 190px;
    height: 220px;
    object-fit: contain;
    filter: drop-shadow(2px 4px 12px rgba(0,0,0,0.32));
  }
  .content-card {
    position: relative;
    z-index: 2;
    margin: 18px 40px 18px 40px;
    background: #fff;
    border-radius: 28px;
    border: 4px solid #ffb833;
    min-height: 660px;
    padding: 36px 48px;
    display: flex;
    gap: 32px;
    align-items: flex-start;
  }
  .step-wrapper {
    flex: 1;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .step-title {
    font-size: 30px;
    font-weight: 700;
    color: #333;
    letter-spacing: 1px;
  }
  .step-title span.red {
    color: #e32019;
    font-weight: 900;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .phone-frame {
    flex: 1;
    border: 4px solid #ff8c00;
    border-radius: 16px;
    min-height: 470px;
    background: #fff;
  }
  .num-badge {
    width: 68px;
    height: 68px;
    background: #e32019;
    color: #fff;
    font-size: 50px;
    font-weight: 900;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: absolute;
    right: 20px;
    bottom: 20px;
  }
  .deco-line {
    position: relative;
    z-index: 2;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 5px;
    padding: 8px 80px;
    flex-wrap: wrap;
  }
  .dash {
    width: 36px; height: 5px;
    background: rgba(255,255,255,0.52);
    border-radius: 3px;
    display: inline-block;
  }
  .deco-stars {
    position: relative;
    z-index: 2;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 58px;
    margin-top: 4px;
  }
</style>
</head>
